name: Test

on:
  pull_request:
  merge_group:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    strategy:
      matrix:
        rust:
          - 1.85.0
          - stable
          - beta
        experimental:
          - false
        include:
          - rust: nightly
            experimental: true
    continue-on-error: ${{ matrix.experimental }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup Rust toolchain
        shell: bash
        run: |
          if [[ "${{ matrix.rust }}" == "stable" ]]; then
            rustup component add rustfmt clippy
          else
            args=(--component rustfmt --component clippy)
            if [[ "${{ matrix.rust }}" == "nightly" ]]; then
              args+=(--allow-downgrade)
            fi
            rustup toolchain install "${{ matrix.rust }}" "${args[@]}"
            rustup override set "${{ matrix.rust }}"
          fi
          rustup show active-toolchain
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/master' }}
      - uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: cargo-nextest
      - name: Format
        run: cargo fmt -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      # TODO: Use something like cargo-hack for more robust feature configuration testing.
      - name: Clippy / all-features
        run: cargo clippy --workspace --all-targets --features persistence -- -D warnings
      - name: Test
        run: cargo nextest run --workspace --all-targets --features persistence --no-fail-fast
      - name: Test Manual Registration / no-default-features
        run: cargo nextest run --workspace --tests --no-fail-fast --no-default-features --features macros
      - name: Test docs
        run: cargo test --workspace --doc

  miri_shards:
    name: Miri (${{ matrix.partition }})
    strategy:
      fail-fast: false
      matrix:
        partition:
          - slice:1/4
          - slice:2/4
          - slice:3/4
          - slice:4/4
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install Miri
        uses: dtolnay/rust-toolchain@miri
        id: rust-toolchain
      - name: Select Miri toolchain
        run: rustup override set "${{ steps.rust-toolchain.outputs.name }}"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # Matrix shards share a cache key, so only one can reserve it for saving.
          save-if: ${{ github.ref == 'refs/heads/master' && matrix.partition == 'slice:1/4' }}
      - uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: cargo-nextest
      - name: Setup Miri
        run: cargo miri setup
      - name: Test with Miri
        run: cargo miri nextest run --no-fail-fast --tests --partition ${{ matrix.partition }}
        env:
          MIRIFLAGS: -Zmiri-disable-isolation
      - name: Run examples with Miri
        if: matrix.partition == 'slice:1/4'
        run: cargo miri run --example calc

  miri:
    name: Miri
    if: always()
    needs: miri_shards
    runs-on: ubuntu-latest
    steps:
      - name: Check Miri shards
        run: test "${{ needs.miri_shards.result }}" = success

  shuttle:
    name: Shuttle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/master' }}
      - uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: cargo-nextest
      - name: Test with Shuttle
        run: cargo nextest run --features shuttle --test parallel

  benchmarks-build:
    # https://github.com/CodSpeedHQ/action/issues/126
    if: github.repository == 'salsa-rs/salsa' &&github.event_name != 'merge_group'
    name: Benchmarks (build)
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: "Setup codspeed"
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: cargo-codspeed

      - name: "Build benchmarks"
        run: |
          cargo codspeed build -m simulation -m memory \
            --bench compare \
            --bench incremental \
            --bench accumulator \
            --bench dataflow
          cargo codspeed build -m walltime --bench lru

      - name: "Upload benchmark binaries"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-binaries
          compression-level: 1
          path: target/codspeed
          if-no-files-found: "error"
          retention-days: 1

  benchmarks:
    name: Benchmarks
    runs-on: codspeed-macro
    needs: benchmarks-build
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: "Setup codspeed"
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: cargo-codspeed

      - name: "Download benchmark binaries"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: benchmark-binaries
          path: target/codspeed

      - name: "Restore binary permissions"
        run: find target/codspeed -type f -exec chmod +x {} +

      - name: "Run benchmarks"
        uses: CodSpeedHQ/action@c145068895e045cc725ee76fcd2307624b65c3af # v4.17.5
        with:
          mode: "simulation,memory,walltime"
          run: |
            cargo codspeed run -m simulation
            cargo codspeed run -m memory
            cargo codspeed run -m walltime
          token: ${{ secrets.CODSPEED_TOKEN }}
